name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        registry-url: 'https://npm.pkg.github.com'
        scope: '@openhands'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      
    - name: Build package
      run: npm run build
      
    - name: Extract version from tag or input
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi
      
    - name: Update package version
      run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
      
    - name: Publish to GitHub Packages
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Create GitHub Release (for tag pushes only)
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## Installation from GitHub Packages
          
          ```bash
          npm install @openhands/typescript-client@${{ steps.version.outputs.VERSION }} --registry=https://npm.pkg.github.com
          ```
          
          Or add to your `.npmrc`:
          ```
          @openhands:registry=https://npm.pkg.github.com
          ```
          
          Then install normally:
          ```bash
          npm install @openhands/typescript-client@${{ steps.version.outputs.VERSION }}
          ```
          
          ## Usage
          
          ```typescript
          import { RemoteConversation } from '@openhands/typescript-client';
          
          const conversation = new RemoteConversation({
            baseUrl: 'http://localhost:8000',
            apiKey: 'your-api-key'
          });
          
          await conversation.start();
          ```